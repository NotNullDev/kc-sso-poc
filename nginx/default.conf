resolver 127.0.0.11 ipv6=off valid=30s;

map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    "" $scheme;
}

server {
    listen 80 default_server;
    server_name _;
    return 302 https://notnulldev.com$request_uri;
}

server {
    listen 80;
    server_name kc-sso-demo.krasisoft.com app1-sso-demo.krasisoft.com app2-sso-demo.krasisoft.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl default_server;
    http2 on;
    server_name _;

    ssl_certificate /etc/nginx/certs/cloudflare-origin.pem;
    ssl_certificate_key /etc/nginx/certs/cloudflare-origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    return 302 https://notnulldev.com$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name kc-sso-demo.krasisoft.com;

    ssl_certificate /etc/nginx/certs/cloudflare-origin.pem;
    ssl_certificate_key /etc/nginx/certs/cloudflare-origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    location / {
        proxy_pass http://keycloak:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name app1-sso-demo.krasisoft.com;

    ssl_certificate /etc/nginx/certs/cloudflare-origin.pem;
    ssl_certificate_key /etc/nginx/certs/cloudflare-origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    set $oauth2_proxy_upstream http://oauth2-proxy-app1:4180;
    set $api_upstream http://app1-backend:3000;
    set $static_root /usr/share/nginx/app1;

    include /etc/nginx/snippets/sso-app.conf;
}

server {
    listen 443 ssl;
    http2 on;
    server_name app2-sso-demo.krasisoft.com;

    ssl_certificate /etc/nginx/certs/cloudflare-origin.pem;
    ssl_certificate_key /etc/nginx/certs/cloudflare-origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    set $oauth2_proxy_upstream http://oauth2-proxy-app2:4180;
    set $api_upstream http://app2-backend:3000;
    set $static_root /usr/share/nginx/app2;

    include /etc/nginx/snippets/sso-app.conf;
}
