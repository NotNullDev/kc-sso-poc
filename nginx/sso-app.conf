location = /oauth2/auth {
    internal;
    proxy_pass $oauth2_proxy_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Original-URL $forwarded_proto://$http_host$request_uri;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Scheme $forwarded_proto;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;
    proxy_set_header X-Forwarded-Port 443;
    proxy_set_header Content-Length "";
    proxy_pass_request_body off;
}

location /oauth2/ {
    add_header Cache-Control "private, no-store, no-cache, max-age=0, must-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;

    proxy_pass $oauth2_proxy_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Scheme $forwarded_proto;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;
    proxy_set_header X-Forwarded-Port 443;
    proxy_set_header X-Auth-Request-Redirect $request_uri;
}

location /api/ {
    auth_request /oauth2/auth;
    error_page 401 = /oauth2/sign_in;

    auth_request_set $access_token $upstream_http_x_auth_request_access_token;
    auth_request_set $auth_cookie $upstream_http_set_cookie;

    add_header Set-Cookie $auth_cookie always;
    add_header Cache-Control "private, no-store, no-cache, max-age=0, must-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;

    proxy_set_header Authorization "Bearer $access_token";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;
    proxy_set_header X-Forwarded-Port 443;
    proxy_pass $api_upstream;
}

location / {
    auth_request /oauth2/auth;
    error_page 401 = /oauth2/sign_in;

    auth_request_set $auth_cookie $upstream_http_set_cookie;

    add_header Set-Cookie $auth_cookie always;
    add_header Cache-Control "private, no-store, no-cache, max-age=0, must-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;

    root $static_root;
    try_files $uri $uri/ /index.html =404;
}
